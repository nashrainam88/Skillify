{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card" style="max-width: 600px; width: 100%;">
        <div class="auth-header text-center mb-4">
            <h2>Join Skillify</h2>
            <p style="color: var(--text-secondary);">Create an account to start your peer-to-peer learning journey</p>
        </div>

        <form action="{{ url_for('signup') }}" method="POST">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" name="firstname" class="form-control" required placeholder="John">
                </div>
                <div class="form-group">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" name="lastname" class="form-control" required placeholder="Doe">
                </div>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="johndoe99">
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="8" placeholder="At least 8 characters">
            </div>

            <div class="form-group">
                <label for="role">I want to join as a:</label>
                <select id="role" name="role" class="form-control" required onchange="toggleMentorType()">
                    <option value="" disabled selected>Select your role</option>
                    <option value="student">Student (Learn skills)</option>
                    <option value="mentor">Mentor (Teach skills)</option>
                </select>
            </div>

            <div class="form-group" id="mentorTypeGroup" style="display: none;">
                <label for="mentor_type">Mentor Category:</label>
                <select id="mentor_type" name="mentor_type" class="form-control">
                    <option value="" disabled selected>Select Mentor Type</option>
                    <option value="Industry Professional">Industry Professional</option>
                    <option value="Academic Tutor">Academic Tutor</option>
                    <option value="Peer Mentor">Peer Mentor</option>
                </select>
            </div>
            
            <script>
            function toggleMentorType() {
                var role = document.getElementById("role").value;
                document.getElementById("mentorTypeGroup").style.display = (role === "mentor") ? "block" : "none";
                document.getElementById("mentor_type").required = (role === "mentor");
            }
            </script>


            <!-- Additional Information (Dynamic Multi-Select) -->
            <div class="form-group">
                <label for="skills">Skills of Interest (Hold Ctrl/Cmd to select multiple)</label>
                <select id="skills" name="skills" class="form-control" multiple required style="height: 100px;">
                    <option value="Python">Python</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="React">React</option>
                    <option value="UI/UX Design">UI/UX Design</option>
                    <option value="Data Science">Data Science</option>
                    <option value="Machine Learning">Machine Learning</option>
                    <option value="Digital Marketing">Digital Marketing</option>
                    <option value="Cybersecurity">Cybersecurity</option>
                </select>
                <small style="color: var(--text-secondary);">Select the skills you want to learn or teach.</small>
            </div>

            <div class="form-group">
                <label for="course">Current Course / Major (Hold Ctrl/Cmd to select multiple)</label>
                <select id="course" name="course" class="form-control" multiple required style="height: 100px;">
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Design">Design</option>
                    <option value="Business Administration">Business Administration</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="college">College / University</label>
                <input type="text" id="college" name="college" class="form-control" placeholder="E.g., University of Tech">
            </div>

            <div class="form-group">
                <label for="bio">Short Bio</label>
                <textarea id="bio" name="bio" class="form-control" rows="3" placeholder="Tell us a little bit about yourself..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; justify-content: center;">Create Account <i class="fas fa-arrow-right"></i></button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
            Already have an account? <a href="{{ url_for('login') }}">Log in here</a>
        </p>
    </div>
</div>
{% endblock %}
